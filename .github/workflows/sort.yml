name: Sort blocklists

on:
  push:
    branches:
      - main
    paths:
      - blocklist
      - whitelist
      - sloplist
      - src/sort.sh

  workflow_dispatch:

permissions:
  contents: write

# Avoid two sorting jobs trying to push simultaneously.
concurrency:
  group: sort-blocklists-main
  cancel-in-progress: false

jobs:
  sort:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sort and deduplicate lists
        run: python3 src/sort.py

      - name: Commit sorted lists
        shell: bash
        run: |
          if git diff --quiet -- blocklist whitelist sloplist; then
            echo "Lists are already sorted."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add blocklist whitelist sloplist
          git commit -m "Sort lists"
          git push origin HEAD:main
